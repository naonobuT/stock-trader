<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - 株式投資ゲーム</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { padding: 24px; max-width: 960px; margin: 0 auto; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
    h2 { font-size: 14px; font-weight: 700; margin: 0 0 12px; color: var(--text); }
    .page-nav { margin-bottom: 20px; }
    .page-nav a { color: var(--accent); text-decoration: none; font-size: 13px; }
    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .stats-grid { display: flex; gap: 24px; margin-bottom: 0; }
    .stat-box { text-align: center; }
    .stat-box .num { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-box .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .import-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .import-path { flex: 1; padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; outline: none; }
    .import-path:focus { border-color: var(--accent); }
    .progress-wrap { margin: 12px 0 0; display: none; }
    .progress-bar-bg { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 6px; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; transition: width 0.2s; }
    .progress-text { font-size: 11px; color: var(--text2); }
    .result-box { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 12px; display: none; }
    .result-box.success { background: rgba(16,185,129,0.1); border: 1px solid var(--green); color: var(--green); }
    .result-box.error   { background: rgba(239,68,68,0.1);  border: 1px solid var(--up);    color: var(--up); }
    .symbol-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .symbol-table th { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text2); font-weight: 600; font-size: 11px; }
    .symbol-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
    .symbol-table tr:last-child td { border-bottom: none; }
    .symbol-table tr:hover td { background: var(--bg3); }
    .del-btn { padding: 2px 8px; font-size: 11px; background: transparent; border: 1px solid #ef4444; color: #ef4444; border-radius: 3px; cursor: pointer; }
    .del-btn:hover { background: rgba(239,68,68,0.15); }
    .table-wrap { max-height: 420px; overflow-y: auto; margin-top: 12px; }
    .filter-input { padding: 5px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 12px; outline: none; width: 200px; }
    .filter-input:focus { border-color: var(--accent); }
    .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .btn-primary { padding: 7px 16px; background: var(--accent); border: none; border-radius: 5px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body class="dark">
  <div class="page-nav"><a href="/">← ゲームに戻る</a></div>
  <h1>管理画面</h1>

  <!-- 統計 -->
  <div class="section">
    <h2>データ概要</h2>
    <div class="stats-grid">
      <div class="stat-box"><div class="num" id="statSymbols">-</div><div class="lbl">銘柄数</div></div>
      <div class="stat-box"><div class="num" id="statRows">-</div><div class="lbl">総データ行数</div></div>
    </div>
  </div>

  <!-- CSV取込 -->
  <div class="section">
    <h2>CSVデータ取込</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">
      株価CSVが入ったフォルダのパスを指定してください。ファイル名が銘柄コードとして取り込まれます。<br>
      例: <code style="color:var(--accent)">C:\StockData\daily</code>
    </p>
    <div class="import-row">
      <input type="text" id="importPath" class="import-path" placeholder="例: C:\StockData\daily">
      <button id="importBtn" class="btn-primary">取込開始</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">準備中...</div>
    </div>
    <div class="result-box" id="resultBox"></div>
  </div>

  <!-- 銘柄一覧 -->
  <div class="section">
    <div class="table-header">
      <h2 style="margin:0">取込済み銘柄一覧</h2>
      <input type="text" id="symbolFilter" class="filter-input" placeholder="コード・銘柄名で絞込">
    </div>
    <div class="table-wrap">
      <table class="symbol-table">
        <thead>
          <tr>
            <th>コード</th>
            <th>銘柄名</th>
            <th>データ件数</th>
            <th>期間</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="symbolTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let allSymbols = [];

    async function loadStats() {
      const r = await fetch('/api/admin/stats');
      const data = await r.json();
      document.getElementById('statSymbols').textContent = data.symbolCount.toLocaleString();
      document.getElementById('statRows').textContent = data.rowCount.toLocaleString();
      allSymbols = data.symbols;
      renderTable(allSymbols);
    }

    function getSymbolName(code) {
      // symbols.csvの情報はサーバー側にあるので /api/stocks/search から取得済みデータを使う
      // ここでは一覧表示なのでコードのみ（名前はサーバー側で返してもらう必要がある）
      return '';
    }

    function renderTable(rows) {
      const tbody = document.getElementById('symbolTableBody');
      tbody.innerHTML = rows.map(s => `
        <tr data-symbol="${s.symbol}">
          <td style="font-weight:700;color:var(--accent)">${s.symbol}</td>
          <td style="color:var(--text2)" id="name-${s.symbol}"></td>
          <td>${s.rows.toLocaleString()}</td>
          <td style="color:var(--text2);font-size:11px">${s.from_date} 〜 ${s.to_date}</td>
          <td><button class="del-btn" data-symbol="${s.symbol}">削除</button></td>
        </tr>
      `).join('');

      tbody.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteSymbol(btn.dataset.symbol));
      });

      // 銘柄名を非同期で補完
      fetchSymbolNames(rows.map(r => r.symbol));
    }

    async function fetchSymbolNames(symbols) {
      // 一括で名前を取得する専用エンドポイントがないので、個別に引く代わりに
      // /api/stocks/search で各コードを検索してキャッシュする
      const unique = [...new Set(symbols)];
      for (const sym of unique) {
        const el = document.getElementById(`name-${sym}`);
        if (!el) continue;
        try {
          const r = await fetch(`/api/stocks/search?q=${encodeURIComponent(sym)}`);
          const results = await r.json();
          const match = results.find(x => x.symbol === sym);
          if (match && match.name) el.textContent = match.name;
        } catch {}
      }
    }

    document.getElementById('symbolFilter').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      if (!q) { renderTable(allSymbols); return; }
      renderTable(allSymbols.filter(s =>
        s.symbol.toLowerCase().includes(q)
      ));
    });

    document.getElementById('importBtn').addEventListener('click', async () => {
      const dir = document.getElementById('importPath').value.trim();
      if (!dir) { alert('フォルダパスを入力してください'); return; }

      const btn = document.getElementById('importBtn');
      btn.disabled = true;
      btn.textContent = '取込中...';

      const progressWrap = document.getElementById('progressWrap');
      const progressBar  = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const resultBox    = document.getElementById('resultBox');

      progressWrap.style.display = 'block';
      resultBox.style.display = 'none';
      progressBar.style.width = '0%';
      progressText.textContent = '準備中...';

      try {
        const response = await fetch('/api/admin/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const msg = JSON.parse(line.slice(6));
            if (msg.type === 'progress') {
              const pct = msg.total ? Math.round(msg.done / msg.total * 100) : 0;
              progressBar.style.width = pct + '%';
              progressText.textContent = `${msg.done} / ${msg.total} ファイル処理中${msg.symbol ? ` (${msg.symbol})` : ''}`;
            } else if (msg.type === 'done') {
              progressBar.style.width = '100%';
              progressText.textContent = '完了';
              resultBox.className = 'result-box success';
              resultBox.style.display = 'block';
              resultBox.innerHTML = `取込完了：${msg.imported} 銘柄 / ${msg.totalRows.toLocaleString()} 行` +
                (msg.errors.length ? `<br>エラー ${msg.errors.length} 件` : '');
              loadStats();
            } else if (msg.type === 'error') {
              resultBox.className = 'result-box error';
              resultBox.style.display = 'block';
              resultBox.textContent = msg.message;
            }
          }
        }
      } catch (err) {
        resultBox.className = 'result-box error';
        resultBox.style.display = 'block';
        resultBox.textContent = 'エラー: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '取込開始';
      }
    });

    async function deleteSymbol(symbol) {
      if (!confirm(`${symbol} のデータを削除しますか？`)) return;
      await fetch(`/api/admin/symbol/${symbol}`, { method: 'DELETE' });
      loadStats();
    }

    loadStats();
  </script>
</body>
</html>
